name: 'Prepare Maven dependencies'
description: 'Set up JDK and Maven (via Maven Wrapper) with optional custom settings.xml'

inputs:
  java-version:
    description: 'Java version to use'
    required: false
    default: '17'
    type: string

runs:
  using: 'composite'
  steps:
    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Setup custom Maven settings (if present)
      working-directory: '.'
      run: |
        if [ -f "./maven/settings.xml" ]; then
          echo "Custom ./maven/settings.xml found"
          mkdir -p ~/.m2
          cp ./maven/settings.xml ~/.m2/settings.xml
        fi
      shell: bash
